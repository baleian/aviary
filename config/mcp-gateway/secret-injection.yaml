# Vault-injection mappings for tool arguments.
#
# Injected args are stripped from tools/list schemas and auto-filled from
# Vault on tools/call. Vault path: secret/aviary/credentials/{sub}/{vault_key}.
#
# Per-tool overrides merge with server-level defaults (tool wins):
#   servers.<name>.tools.<tool>.args.<arg>.vault_key

servers:
  jira:
    args:
      jira_token:
        vault_key: jira-token
      jira_email:
        vault_key: jira-email

  confluence:
    args:
      confluence_token:
        vault_key: confluence-token
      confluence_email:
        vault_key: confluence-email
