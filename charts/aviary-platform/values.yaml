platformNamespace: platform
agentsNamespace: agents

# VPC NAT IP — resolved at render time.
hostGatewayIP: ""

baselineEgress:
  enabled: true
  allowHostGatewayPorts:
    - 8090   # LiteLLM (inference + aggregated MCP)
  allowPlatformPorts:
    - 8000   # API
    - 9000   # Supervisor (A2A)

# In prod, postgres/redis/temporal/keycloak/vault/litellm resolve to
# managed endpoints injected via Values/Secrets — no compose proxy.
externalServices:
  enabled: false
  services: []

imageWarmer:
  enabled: true
  image: aviary-runtime:latest
  pauseImage: registry.k8s.io/pause:3.9

# Single RWX PVC mounted by every runtime env so sessions migrate intact.
sharedWorkspace:
  enabled: true
  name: aviary-shared-workspace
  size: 50Gi
  # EFS dynamic provisioning — no static PV needed.
  storageClassName: efs-sc
  hostPath: ""
