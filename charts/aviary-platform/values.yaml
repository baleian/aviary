# Default values — inherited by values-dev.yaml and values-prod.yaml.

platformNamespace: platform
agentsNamespace: agents

# Host IP seen from inside the cluster. Must resolve to the docker-compose
# bridge (dev) or the VPC NAT/ALB IP (prod).
hostGatewayIP: ""

# NetworkPolicy enforced on every pod labeled aviary/role=agent-runtime in the
# agents namespace. Agents always see this in addition to any extra rules an
# environment opts into via extraEgress.
baselineEgress:
  enabled: true
  allowHostGatewayPorts:
    - 8000   # API
    - 8090   # LiteLLM
    - 8100   # MCP Gateway

# Dev-only: proxy docker-compose services (mcp-gateway, litellm) into the
# cluster via Service + Endpoints with the host gateway IP.
externalServices:
  enabled: false
  services:
    - name: mcp-gateway
      clusterPort: 8100
      hostPort: 8100
    - name: litellm
      clusterPort: 4000
      hostPort: 8090

# Warm the runtime image on every node so pod starts don't pay the pull cost.
imageWarmer:
  enabled: false
  image: aviary-runtime:latest
