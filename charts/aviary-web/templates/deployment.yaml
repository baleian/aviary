apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aviary-web.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aviary-web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "aviary-web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aviary-web.labels" . | nindent 8 }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: INTERNAL_API_URL
              value: {{ .Values.config.internalAPIURL | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
