namespace: platform

replicas: 1

# All URLs come from window.location at runtime — the image is environment-agnostic.
image:
  repository: aviary-web
  tag: latest
  pullPolicy: Never

# NodePort is the off-cluster Caddy proxy's upstream — mirrors how prod
# ALB targets the web Service. The browser never hits this directly.
service:
  type: NodePort
  port: 3000
  nodePort: 31301

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 1,    memory: 1Gi }

livenessProbe:
  httpGet: { path: /, port: 3000 }
  initialDelaySeconds: 15
  periodSeconds: 30
readinessProbe:
  httpGet: { path: /, port: 3000 }
  initialDelaySeconds: 5
  periodSeconds: 10
