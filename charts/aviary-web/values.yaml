namespace: platform

replicas: 2

# All URLs come from window.location at runtime — the image is environment-agnostic.
image:
  repository: aviary-web
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  nodePort: 31301

resources:
  requests: { cpu: 200m, memory: 512Mi }
  limits:   { cpu: 1,    memory: 1Gi }

livenessProbe:
  httpGet: { path: /, port: 3000 }
  initialDelaySeconds: 15
  periodSeconds: 30
readinessProbe:
  httpGet: { path: /, port: 3000 }
  initialDelaySeconds: 5
  periodSeconds: 10
