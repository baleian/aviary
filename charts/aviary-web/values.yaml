namespace: platform

replicas: 1

# NEXT_PUBLIC_* and INTERNAL_API_URL are baked at build time, so the image tag
# carries the env it was built for. Local: :k8s-local. Prod: CI-built tag.
image:
  repository: aviary-web
  tag: k8s-local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  nodePort: 31300

config:
  internalAPIURL: "http://aviary-api.platform.svc.cluster.local:8000"

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 1,    memory: 1Gi }

livenessProbe:
  httpGet: { path: /, port: 3000 }
  initialDelaySeconds: 15
  periodSeconds: 30
readinessProbe:
  httpGet: { path: /, port: 3000 }
  initialDelaySeconds: 5
  periodSeconds: 10
