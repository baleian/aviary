namespace: platform

replicas: 1

image:
  repository: aviary-api
  tag: latest
  pullPolicy: Never

hostGatewayIP: ""

service:
  type: NodePort
  port: 8000
  nodePort: 31000

config:
  databaseURL: "postgresql+asyncpg://aviary:aviary@postgres.platform.svc.cluster.local:5432/aviary"
  redisURL: "redis://redis.platform.svc.cluster.local:6379/0"
  supervisorURL: "http://aviary-supervisor.platform.svc.cluster.local:9000"
  temporalHost: "temporal.platform.svc.cluster.local:7233"
  temporalNamespace: "default"
  temporalTaskQueue: "aviary-workflows"
  oidcIssuer: "http://localhost:8080/realms/aviary"
  oidcInternalIssuer: "http://host.k8s.internal:8080/realms/aviary"
  oidcClientID: "aviary-web"
  llmGatewayURL: "http://litellm.platform.svc.cluster.local:4000"
  mcpGatewayURL: "http://litellm.platform.svc.cluster.local:4000"
  vaultAddr: "http://vault.platform.svc.cluster.local:8200"
  devUserSub: "dev-user"
  cookieSecure: "false"
  # The Caddy proxy entry on :80 is the only origin the browser ever uses.
  corsOrigins: '["http://localhost"]'

secrets:
  oidcClientSecret: ""
  llmGatewayAPIKey: "sk-aviary-dev"
  mcpGatewayAPIKey: "sk-aviary-dev"
  vaultToken: "dev-root-token"
  workerSharedSecret: "dev-worker-secret-change-me"

# Mounts the project root config.yaml so direct-LLM mode and secret fallback
# stay parity with compose.
configFile:
  enabled: true
  configMapName: aviary-config

migrate:
  enabled: true
  image:
    repository: aviary-shared-migrate
    tag: latest
    pullPolicy: IfNotPresent

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 2,    memory: 1Gi }

livenessProbe:
  httpGet: { path: /api/health, port: 8000 }
  initialDelaySeconds: 10
  periodSeconds: 30
readinessProbe:
  httpGet: { path: /api/health, port: 8000 }
  initialDelaySeconds: 3
  periodSeconds: 10
