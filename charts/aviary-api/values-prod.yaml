replicas: 2

image:
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

config:
  cookieSecure: "true"

# Sealed/ExternalSecret replaces the rendered Secret object.
secrets: {}

migrate:
  enabled: true
  image:
    pullPolicy: IfNotPresent

resources:
  requests: { cpu: 500m, memory: 512Mi }
  limits:   { cpu: 2,    memory: 2Gi }
