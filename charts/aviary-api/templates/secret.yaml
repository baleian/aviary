apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aviary-api.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aviary-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | default "" | quote }}
  LLM_GATEWAY_API_KEY: {{ .Values.secrets.llmGatewayAPIKey | default "" | quote }}
  MCP_GATEWAY_API_KEY: {{ .Values.secrets.mcpGatewayAPIKey | default "" | quote }}
  VAULT_TOKEN: {{ .Values.secrets.vaultToken | default "" | quote }}
  WORKER_SHARED_SECRET: {{ .Values.secrets.workerSharedSecret | default "" | quote }}
