apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aviary-api.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aviary-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "aviary-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aviary-api.labels" . | nindent 8 }}
    spec:
      {{- if .Values.hostGatewayIP }}
      hostAliases:
        - ip: {{ .Values.hostGatewayIP | quote }}
          hostnames: ["host.k8s.internal"]
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: DATABASE_URL
              value: {{ .Values.config.databaseURL | quote }}
            - name: REDIS_URL
              value: {{ .Values.config.redisURL | quote }}
            - name: SUPERVISOR_URL
              value: {{ .Values.config.supervisorURL | quote }}
            - name: TEMPORAL_HOST
              value: {{ .Values.config.temporalHost | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.config.temporalNamespace | quote }}
            - name: TEMPORAL_TASK_QUEUE
              value: {{ .Values.config.temporalTaskQueue | quote }}
            - name: OIDC_ISSUER
              value: {{ .Values.config.oidcIssuer | quote }}
            - name: OIDC_INTERNAL_ISSUER
              value: {{ .Values.config.oidcInternalIssuer | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.config.oidcClientID | quote }}
            - name: LLM_GATEWAY_URL
              value: {{ .Values.config.llmGatewayURL | quote }}
            - name: MCP_GATEWAY_URL
              value: {{ .Values.config.mcpGatewayURL | quote }}
            - name: VAULT_ADDR
              value: {{ .Values.config.vaultAddr | quote }}
            - name: DEV_USER_SUB
              value: {{ .Values.config.devUserSub | quote }}
            - name: COOKIE_SECURE
              value: {{ .Values.config.cookieSecure | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}
          envFrom:
            - secretRef:
                name: {{ include "aviary-api.fullname" . }}
          {{- if .Values.configFile.enabled }}
          volumeMounts:
            - name: aviary-config
              mountPath: /workspace/config.yaml
              subPath: config.yaml
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      {{- if .Values.configFile.enabled }}
      volumes:
        - name: aviary-config
          configMap:
            name: {{ .Values.configFile.configMapName }}
      {{- end }}
