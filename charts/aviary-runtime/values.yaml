# One release = one runtime environment. Self-contained prod values for
# the default environment; copy + tweak for additional envs.

name: default

namespace: agents
platformNamespace: platform

# Static replica count. Scale-to-zero intentionally unsupported — environments
# are always on. If scaling becomes needed, add an HPA/KEDA resource here.
replicas: 2

image:
  # CI build / release pipeline supplies the tag.
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

runtime:
  port: 3000
  # Prod typically splits inference and MCP onto separate services.
  llmGatewayURL: ""
  llmGatewayAPIKey: ""
  mcpGatewayURL: ""
  mcpGatewayAPIKey: ""
  aviaryAPIURL: "http://aviary-api.platform.svc.cluster.local:8000/api"
  supervisorURL: "http://aviary-supervisor.platform.svc.cluster.local:9000"
  # Empty → github.com. Set to redirect gh / git to an Enterprise host.
  githubHost: ""
  # Switch to a PSA-compliant securityContext + CAP_SYS_ADMIN for bwrap.
  privileged: false

# Supervisor runs in-cluster (or the env is behind an LB) — ClusterIP suffices.
service:
  type: ClusterIP
  nodePort: 30300

# Host IP seen from inside the cluster — unused in prod.
hostGatewayIP: ""

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

pvc:
  mountPath: /workspace-root
  claimName: aviary-shared-workspace

# Extra NetworkPolicy egress rules for this environment's pods. Empty list
# = baseline only. Rules are raw networking.k8s.io/v1 egress fragments.
extraEgress: []

# Termination grace period — long so in-flight sessions can drain.
terminationGracePeriodSeconds: 600

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /ready
    port: 3000
  initialDelaySeconds: 3
