apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aviary-supervisor.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aviary-supervisor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "aviary-supervisor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aviary-supervisor.labels" . | nindent 8 }}
    spec:
      {{- if .Values.hostGatewayIP }}
      hostAliases:
        - ip: {{ .Values.hostGatewayIP | quote }}
          hostnames: ["host.k8s.internal"]
      {{- end }}
      containers:
        - name: supervisor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: REDIS_URL
              value: {{ .Values.config.redisURL | quote }}
            - name: DEFAULT_RUNTIME_ENDPOINT
              value: {{ .Values.config.defaultRuntimeEndpoint | quote }}
            - name: OIDC_ISSUER
              value: {{ .Values.config.oidcIssuer | quote }}
            - name: OIDC_INTERNAL_ISSUER
              value: {{ .Values.config.oidcInternalIssuer | quote }}
            - name: DEV_USER_SUB
              value: {{ .Values.config.devUserSub | quote }}
            - name: LLM_GATEWAY_URL
              value: {{ .Values.config.llmGatewayURL | quote }}
            - name: VAULT_ADDR
              value: {{ .Values.config.vaultAddr | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.config.otelExporterOtlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.config.otelServiceName | quote }}
          envFrom:
            - secretRef:
                name: {{ include "aviary-supervisor.fullname" . }}
          {{- if .Values.configFile.enabled }}
          volumeMounts:
            - name: aviary-config
              mountPath: /workspace/config.yaml
              subPath: config.yaml
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      {{- if .Values.configFile.enabled }}
      volumes:
        - name: aviary-config
          configMap:
            name: {{ .Values.configFile.configMapName }}
      {{- end }}
