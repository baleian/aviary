apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aviary-supervisor.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aviary-supervisor.labels" . | nindent 4 }}
type: Opaque
stringData:
  WORKER_SHARED_SECRET: {{ .Values.secrets.workerSharedSecret | default "" | quote }}
  VAULT_TOKEN: {{ .Values.secrets.vaultToken | default "" | quote }}
  LLM_GATEWAY_API_KEY: {{ .Values.secrets.llmGatewayAPIKey | default "" | quote }}
