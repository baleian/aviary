namespace: platform

# In-memory stream registry — cap at 1 replica until backed by external state.
replicas: 1

image:
  repository: aviary-supervisor
  tag: latest
  pullPolicy: IfNotPresent

hostGatewayIP: ""

service:
  type: ClusterIP
  port: 9000

config:
  redisURL: "redis://redis.platform.svc.cluster.local:6379/0"
  defaultRuntimeEndpoint: "http://aviary-env-default.agents.svc.cluster.local:3000"
  oidcIssuer: ""
  oidcInternalIssuer: ""
  devUserSub: "dev-user"
  llmGatewayURL: ""
  vaultAddr: ""
  otelExporterOtlpEndpoint: ""
  otelServiceName: ""

# In prod the rendered Secret is replaced via Sealed/ExternalSecrets.
secrets: {}

# Disable in prod — values + ExternalSecrets are the source of truth there.
configFile:
  enabled: false
  configMapName: aviary-config

resources:
  requests: { cpu: 500m, memory: 512Mi }
  limits:   { cpu: 2,    memory: 2Gi }

livenessProbe:
  httpGet: { path: /v1/health, port: 9000 }
  initialDelaySeconds: 10
  periodSeconds: 30
readinessProbe:
  httpGet: { path: /v1/health, port: 9000 }
  initialDelaySeconds: 3
  periodSeconds: 10
