apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aviary-workflow-worker.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aviary-workflow-worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  WORKER_SHARED_SECRET: {{ .Values.secrets.workerSharedSecret | default "" | quote }}
