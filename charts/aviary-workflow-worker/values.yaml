namespace: platform

replicas: 2

image:
  repository: aviary-workflow-worker
  tag: latest
  pullPolicy: IfNotPresent

hostGatewayIP: ""

config:
  databaseURL: "postgresql+asyncpg://aviary:aviary@postgres.platform.svc.cluster.local:5432/aviary"
  redisURL: "redis://redis.platform.svc.cluster.local:6379/0"
  temporalHost: "temporal.platform.svc.cluster.local:7233"
  temporalNamespace: "default"
  temporalTaskQueue: "aviary-workflows"
  supervisorURL: "http://aviary-supervisor.platform.svc.cluster.local:9000"

# In prod the rendered Secret is replaced via Sealed/ExternalSecrets.
secrets: {}

resources:
  requests: { cpu: 200m, memory: 512Mi }
  limits:   { cpu: 2,    memory: 2Gi }
