name: aviary

# App services. Infra deps live in compose.infra.yml under the same project
# name `aviary`, so a `-f compose.yml -f compose.infra.yml` invocation gives
# you the full stack while `-f compose.yml` alone targets just the app.

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    environment:
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aviary:aviary@postgres:5432/aviary}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OIDC_ISSUER: ${OIDC_ISSUER:?OIDC_ISSUER is required}
      OIDC_INTERNAL_ISSUER: ${OIDC_INTERNAL_ISSUER:-http://keycloak:8080/realms/aviary}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?OIDC_CLIENT_ID is required}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      SUPERVISOR_URL: ${SUPERVISOR_URL:-http://supervisor:9000}
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://litellm:4000}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY:?LLM_GATEWAY_API_KEY is required}
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-http://litellm:4000}
      MCP_GATEWAY_API_KEY: ${MCP_GATEWAY_API_KEY:?MCP_GATEWAY_API_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      TEMPORAL_HOST: ${TEMPORAL_HOST:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-aviary-workflows}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:?VAULT_TOKEN is required}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aviary:aviary@postgres:5432/aviary}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  supervisor:
    build:
      context: .
      dockerfile: agent-supervisor/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEFAULT_RUNTIME_ENDPOINT: ${DEFAULT_RUNTIME_ENDPOINT:-http://runtime:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
      OIDC_ISSUER: ${OIDC_ISSUER:?OIDC_ISSUER is required}
      OIDC_INTERNAL_ISSUER: ${OIDC_INTERNAL_ISSUER:-http://keycloak:8080/realms/aviary}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:?VAULT_TOKEN is required}
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-dev-worker-secret-change-me}
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://litellm:4000}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  workflow-worker:
    build:
      context: .
      dockerfile: workflow-worker/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    environment:
      TEMPORAL_HOST: ${TEMPORAL_HOST:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-aviary-workflows}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aviary:aviary@postgres:5432/aviary}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SUPERVISOR_URL: ${SUPERVISOR_URL:-http://supervisor:9000}
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-dev-worker-secret-change-me}

  runtime:
    build:
      context: ./runtime
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
    # Lets agents reach external hosts (e.g. GitHub Enterprise) via host networking.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    environment:
      PORT: "3000"
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://litellm:4000}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY:?LLM_GATEWAY_API_KEY is required}
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-http://litellm:4000}
      MCP_GATEWAY_API_KEY: ${MCP_GATEWAY_API_KEY:?MCP_GATEWAY_API_KEY is required}
      AVIARY_API_URL: http://api:8000/api
      AVIARY_SUPERVISOR_URL: http://supervisor:9000
      GITHUB_HOST: ${GITHUB_HOST:-}
    volumes:
      - runtime-workspace:/workspace-root
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      target: runner
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
    environment:
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  proxy:
    image: caddy:2-alpine
    ports:
      - "${PROXY_PORT:-3000}:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  runtime-workspace:
