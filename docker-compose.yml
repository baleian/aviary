services:
  # -- Infrastructure --
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aviary
      POSTGRES_USER: aviary
      POSTGRES_PASSWORD: aviary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks: [platform]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aviary"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [platform]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- DB Migration --
  db-migrate:
    build:
      context: ./shared
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
    networks: [platform]
    depends_on:
      postgres:
        condition: service_healthy

  # -- Agent Supervisor --
  agent-supervisor:
    build:
      context: .
      dockerfile: agent-supervisor/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "9000:9000"
    volumes:
      - ./agent-supervisor:/workspace/agent-supervisor
      - ./shared:/workspace/shared
      - /var/run/docker.sock:/var/run/docker.sock
      - /workspace/.venv
    networks: [platform, agent]
    environment:
      RUNTIME_BACKEND: docker
      RUNTIME_IMAGE: aviary-runtime:latest
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      REDIS_URL: redis://redis:6379/0
      DOCKER_SOCKET: /var/run/docker.sock
      INFERENCE_ROUTER_URL: ${INFERENCE_ROUTER_URL:-}
      AGENT_PRIMARY_NETWORK: aviary-agent-default
      SCALING_CHECK_INTERVAL: "5"
      IDLE_CLEANUP_INTERVAL: "30"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  platform:
    name: aviary_platform
  agent:
    name: aviary-agent-default
    internal: true
  egress-open:
    name: aviary-egress-open

volumes:
  pgdata:
