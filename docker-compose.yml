services:
  # -- Infrastructure --
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aviary
      POSTGRES_USER: aviary
      POSTGRES_PASSWORD: aviary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks: [platform]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aviary"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    entrypoint: ["vault"]
    command: ["server", "-config=/vault/config/vault.hcl"]
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      SKIP_SETCAP: "true"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks: [platform]
    volumes:
      - vaultdata:/vault/data
      - ./config/vault/vault.hcl:/vault/config/vault.hcl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet 'http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
    networks: [platform]
    volumes:
      - vaultdata:/vault/data
      - ./scripts/vault-init.sh:/usr/local/bin/vault-init.sh:ro
    entrypoint: /bin/sh
    command: ["/usr/local/bin/vault-init.sh"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [platform]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- DB Migration --
  db-migrate:
    build:
      context: ./shared
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
    networks: [platform]
    depends_on:
      postgres:
        condition: service_healthy

  # -- LLM Gateway (LiteLLM → host llama-swap → host llama-server) --
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml:ro
      - ./config/litellm/patches/aviary_user_api_key.py:/usr/lib/python3.13/site-packages/aviary_user_api_key.py:ro
      - ./config/litellm/patches/aviary_patches.pth:/usr/lib/python3.13/site-packages/aviary_patches.pth:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-aviary-dev}
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
      OIDC_ISSUER: "http://localhost:8180/realms/aviary"
      OIDC_INTERNAL_ISSUER: "http://keycloak:8080/realms/aviary"
    depends_on:
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    networks: [platform, agent]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health/liveliness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # -- Keycloak (OIDC) --
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: aviary
      KC_DB_PASSWORD: aviary
    ports:
      - "8180:8080"
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
    networks: [platform]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Image has no curl/wget but bash is present; use /dev/tcp to probe
      # the realm's OIDC discovery doc — this is exactly what downstream
      # services (API, tests) need before they can start.
      test:
        - "CMD"
        - "bash"
        - "-c"
        - |
          exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1
          printf 'GET /realms/aviary/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          grep -q '"issuer"' <&3
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  # -- API Server --
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/workspace/api
      - ./shared:/workspace/shared
      - /workspace/.venv
    networks: [platform]
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      REDIS_URL: redis://redis:6379/0
      SUPERVISOR_URL: http://agent-supervisor:9000
      OIDC_ISSUER: http://localhost:8180/realms/aviary
      OIDC_INTERNAL_ISSUER: http://keycloak:8080/realms/aviary
      OIDC_CLIENT_ID: aviary-web
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      agent-supervisor:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -- Agent Supervisor --
  agent-supervisor:
    build:
      context: .
      dockerfile: agent-supervisor/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "9000:9000"
    volumes:
      - ./agent-supervisor:/workspace/agent-supervisor
      - ./shared:/workspace/shared
      - /var/run/docker.sock:/var/run/docker.sock
      - /workspace/.venv
    networks: [platform, agent]
    environment:
      RUNTIME_BACKEND: docker
      RUNTIME_IMAGE: aviary-runtime:latest
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      REDIS_URL: redis://redis:6379/0
      DOCKER_SOCKET: /var/run/docker.sock
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://litellm:4000}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY:-sk-aviary-dev}
      AGENT_PRIMARY_NETWORK: aviary-agent-default
      # Production-sensible defaults; override via env for test runs
      # (see scripts/test.sh for the short values used by the e2e suites).
      SCALING_CHECK_INTERVAL: ${SCALING_CHECK_INTERVAL:-30}
      IDLE_CLEANUP_INTERVAL: ${IDLE_CLEANUP_INTERVAL:-300}
      AGENT_IDLE_TIMEOUT: ${AGENT_IDLE_TIMEOUT:-604800}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9000/v1/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  platform:
    name: aviary_platform
  agent:
    name: aviary-agent-default
    internal: true
  egress-open:
    name: aviary-egress-open

volumes:
  pgdata:
  vaultdata:
