<!DOCTYPE html><html data-src-ver="027e1ecc" lang="ko" data-theme="dark" data-accent="blue"><head>


  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aviary — Internal agents &amp; workflows</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="icons.jsx" data-plugins="transform-react-jsx-source,om-src-id" data-filename="icons.jsx"></script>
  <script type="text/babel" src="shell.jsx" data-plugins="transform-react-jsx-source,om-src-id" data-filename="shell.jsx"></script>
  <script type="text/babel" src="screens-1.jsx" data-plugins="transform-react-jsx-source,om-src-id" data-filename="screens-1.jsx"></script>
  <script type="text/babel" src="screens-2.jsx" data-plugins="transform-react-jsx-source,om-src-id" data-filename="screens-2.jsx"></script>
  <script type="text/babel" src="screens-3.jsx" data-plugins="transform-react-jsx-source,om-src-id" data-filename="screens-3.jsx"></script>
  <script type="text/babel" src="screens-4.jsx" data-plugins="transform-react-jsx-source,om-src-id" data-filename="screens-4.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx" data-plugins="transform-react-jsx-source,om-src-id" data-filename="tweaks-panel.jsx"></script>

  <script type="text/babel" data-plugins="transform-react-jsx-source,om-src-id" data-filename="inline-7">
  /* global React, ReactDOM, Icons, Shell, Data, Screens1, Screens2, Screens3, Screens4, TweaksPanel, useTweaks, TweakSection, TweakRadio */
  const { useState, useEffect } = React;
  const h = React.createElement;
  const { Sidebar, Header, SearchPalette, UserMenu, Notifications, Crumb, CrumbLink, CrumbSep } = Shell;
  const { DashboardScreen, AgentsScreen } = Screens1;
  const { AgentDetailScreen } = Screens2;
  const { WorkflowsScreen, WorkflowDetailScreen } = Screens3;
  const { MarketplaceScreen, MarketplaceItemScreen } = Screens4;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "accent": "blue"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [route, setRoute] = useState({ primary: "dashboard" });
    const [collapsed, setCollapsed] = useState(false);
    const [searchOpen, setSearchOpen] = useState(false);
    const [userMenuOpen, setUserMenuOpen] = useState(false);
    const [notifOpen, setNotifOpen] = useState(false);

    useEffect(() => {
      document.documentElement.setAttribute("data-theme", t.theme);
      document.documentElement.setAttribute("data-accent", t.accent);
    }, [t.theme, t.accent]);

    useEffect(() => {
      const onKey = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
          e.preventDefault(); setSearchOpen(o => !o);
        }
        if (e.key === "Escape") {
          setSearchOpen(false); setUserMenuOpen(false); setNotifOpen(false);
        }
      };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, []);

    const agent = route.agentId ? Data.agents.find(a => a.id === route.agentId) : null;
    const workflow = route.workflowId ? Data.workflows.find(w => w.id === route.workflowId) : null;
    const mpItem = route.itemId ? Data.marketplace.find(m => m.id === route.itemId) : null;

    const crumb = h(Crumb, null,
      route.primary === "dashboard" && h(CrumbLink, { active: true }, "Dashboard"),
      route.primary === "agents" && h(CrumbLink, { active: true }, "Agents"),
      route.primary === "agent" && [
        h(CrumbLink, { key: 1, onClick: () => setRoute({ primary: "agents" }) }, "Agents"),
        h(CrumbSep, { key: 2 }),
        h(CrumbLink, { key: 3, active: true }, agent ? agent.name : "Agent")
      ],
      route.primary === "workflows" && h(CrumbLink, { active: true }, "Workflows"),
      route.primary === "workflow" && [
        h(CrumbLink, { key: 1, onClick: () => setRoute({ primary: "workflows" }) }, "Workflows"),
        h(CrumbSep, { key: 2 }),
        h(CrumbLink, { key: 3, active: true }, workflow ? workflow.name : "Workflow")
      ],
      route.primary === "marketplace" && !route.itemId && h(CrumbLink, { active: true }, "Marketplace"),
      route.primary === "marketplace" && route.itemId && [
        h(CrumbLink, { key: 1, onClick: () => setRoute({ primary: "marketplace" }) }, "Marketplace"),
        h(CrumbSep, { key: 2 }),
        h(CrumbLink, { key: 3, active: true }, mpItem ? mpItem.name : "Item")
      ]
    );

    let content;
    if (route.primary === "dashboard") content = h(DashboardScreen, { onRoute: setRoute });
    else if (route.primary === "agents") content = h(AgentsScreen, { onRoute: setRoute });
    else if (route.primary === "agent") content = h(AgentDetailScreen, { agentId: route.agentId, sessionId: route.sessionId, onRoute: setRoute });
    else if (route.primary === "workflows") content = h(WorkflowsScreen, { onRoute: setRoute });
    else if (route.primary === "workflow") content = h(WorkflowDetailScreen, { workflowId: route.workflowId, onRoute: setRoute });
    else if (route.primary === "marketplace" && !route.itemId) content = h(MarketplaceScreen, { onRoute: setRoute });
    else if (route.primary === "marketplace" && route.itemId) content = h(MarketplaceItemScreen, { itemId: route.itemId, onRoute: setRoute });

    const sidebarRoute = { primary: route.primary === "agent" ? "agents" : route.primary === "workflow" ? "workflows" : route.primary };

    return h(React.Fragment, null,
      h("div", { style: { display: "flex", height: "100vh", width: "100vw", overflow: "hidden" } },
        h(Sidebar, {
          route: sidebarRoute, onRoute: setRoute,
          collapsed, onToggleCollapse: () => setCollapsed(c => !c)
        }),
        h("div", { style: { display: "flex", flexDirection: "column", flex: 1, minWidth: 0 } },
          h(Header, {
            crumb,
            onOpenSearch: () => setSearchOpen(true),
            onOpenUserMenu: () => setUserMenuOpen(o => !o),
            onOpenNotifications: () => setNotifOpen(o => !o),
            userMenuOpen, notifOpen, theme: t.theme,
          }),
          h("div", { style: { flex: 1, overflow: "hidden", position: "relative" } }, content)
        )
      ),
      h(SearchPalette, { open: searchOpen, onClose: () => setSearchOpen(false), onNavigate: setRoute }),
      h(UserMenu, { open: userMenuOpen, onClose: () => setUserMenuOpen(false), theme: t.theme, setTheme: v => setTweak("theme", v), onRoute: setRoute }),
      h(Notifications, { open: notifOpen, onClose: () => setNotifOpen(false) }),
      h(TweaksPanel, { title: "Tweaks" },
        h(TweakSection, { label: "Appearance" },
          h(TweakRadio, { label: "Theme", value: t.theme, options: [{label:"Light",value:"light"},{label:"Dark",value:"dark"}], onChange: v => setTweak("theme", v) }),
          h(TweakRadio, { label: "Accent", value: t.accent, options: [{label:"Blue",value:"blue"},{label:"Green",value:"green"}], onChange: v => setTweak("accent", v) })
        )
      )
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>


</body></html>
