# Dev-only overrides. Auto-merged by `docker compose` commands unless an
# explicit `-f docker-compose.yml` is passed (as setup-real.sh does).
#
# Adds:
#   - source bind-mounts so edits on the host land inside the container
#   - anonymous volumes to preserve the image's installed deps (.venv,
#     node_modules, .next) from being shadowed by the bind-mount
#   - command overrides that add --reload (uvicorn) / `npm run dev` (next)
services:
  supervisor:
    volumes:
      - ./agent-supervisor:/workspace/agent-supervisor
      - /workspace/.venv
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9000", "--reload"]

  workflow-worker:
    volumes:
      - ./workflow-worker:/workspace/workflow-worker
      - ./shared:/workspace/shared
      - /workspace/.venv

  api:
    volumes:
      - ./api:/workspace/api
      - ./shared:/workspace/shared
      - /workspace/.venv
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--no-access-log"]

  admin:
    volumes:
      - ./admin:/workspace/admin
      - ./shared:/workspace/shared
      - /workspace/.venv
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--no-access-log"]

  web:
    build:
      target: dev
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_OIDC_ISSUER: http://localhost:8080/realms/aviary
      NEXT_PUBLIC_OIDC_CLIENT_ID: aviary-web
    command: ["npm", "run", "dev"]
