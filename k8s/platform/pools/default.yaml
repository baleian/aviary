# Pool: default
#
# Baseline agent runtime pool. Egress is restricted to Aviary platform services
# (LLM gateway, MCP gateway, API server) and DNS. Use this pool for agents that
# don't need to reach the public internet or sensitive internal systems.
#
# ${HOST_GATEWAY_IP} is substituted by setup-dev.sh at apply time. In local
# dev every platform service lives on the docker host and is reached via
# `host.k8s.internal` (hostAliases). In prod (EKS) these would be in-cluster
# Service DNS — the only change is swapping env values in this file.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: env-default
  namespace: agents
  labels:
    aviary/pool: default

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: env-default
  namespace: agents
  labels:
    aviary/pool: default
spec:
  podSelector:
    matchLabels:
      aviary/pool: default
  policyTypes: [Egress, Ingress]
  ingress:
    # Pool Services accept ingress only via the K8s API service-proxy (the
    # supervisor authenticates as the `agent-supervisor` ServiceAccount and
    # forwards requests through kube-apiserver). No other pods in the cluster
    # call the runtime directly, so we simply don't expose any namespace/pod
    # selector here — kube-apiserver itself is the implicit ingress path.
    - {}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { port: 53, protocol: UDP }
    # Docker host — all platform services live there in local dev and are
    # reachable via `host.k8s.internal` (hostAliases below).
    - to:
        - ipBlock:
            cidr: ${HOST_GATEWAY_IP}/32
      ports:
        - { port: 8000, protocol: TCP }   # API server
        - { port: 8090, protocol: TCP }   # LiteLLM
        - { port: 8100, protocol: TCP }   # MCP Gateway
        - { port: 6379, protocol: TCP }   # Redis (A2A publish-through)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-default
  namespace: agents
  labels:
    aviary/pool: default
    aviary/role: agent-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      aviary/pool: default
  template:
    metadata:
      labels:
        aviary/pool: default
        aviary/role: agent-runtime
    spec:
      serviceAccountName: env-default
      terminationGracePeriodSeconds: 600
      hostAliases:
        - ip: "${HOST_GATEWAY_IP}"
          hostnames: ["host.k8s.internal"]
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-workspace-perms
          image: aviary-runtime:latest
          imagePullPolicy: Never
          securityContext: { runAsUser: 0, runAsGroup: 0 }
          command: ["chown", "-R", "1000:1000", "/agent-platform"]
          volumeMounts:
            - { name: workspace, mountPath: /agent-platform }
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
      containers:
        - name: runtime
          image: aviary-runtime:latest
          imagePullPolicy: Never
          ports:
            - { containerPort: 3000, name: http }
          env:
            - { name: POOL_NAME, value: "default" }
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - { name: INFERENCE_ROUTER_URL, value: "http://host.k8s.internal:8090" }
            - { name: LITELLM_API_KEY,      value: "sk-aviary-dev" }
            - { name: MCP_GATEWAY_URL,      value: "http://host.k8s.internal:8100" }
            - { name: AVIARY_API_URL,       value: "http://host.k8s.internal:8000/api" }
            - { name: AVIARY_INTERNAL_API_KEY, value: "sk-aviary-internal" }
          volumeMounts:
            - { name: workspace, mountPath: /agent-platform }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /ready, port: 3000 }
            initialDelaySeconds: 3
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: agents-workspace

---
apiVersion: v1
kind: Service
metadata:
  name: env-default
  namespace: agents
  labels:
    aviary/pool: default
spec:
  selector:
    aviary/pool: default
  ports:
    - { name: http, port: 3000, targetPort: 3000, protocol: TCP }
