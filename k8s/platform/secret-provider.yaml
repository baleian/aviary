apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-provider
  namespace: platform
  labels:
    aviary/service: secret-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      aviary/service: secret-provider
  template:
    metadata:
      labels:
        aviary/service: secret-provider
    spec:
      hostAliases:
        - ip: "${HOST_GATEWAY_IP}"
          hostnames: ["host.k8s.internal"]
      containers:
        - name: secret-provider
          image: aviary-secret-provider:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://aviary:aviary@host.k8s.internal:5432/aviary"
            - name: VAULT_ADDR
              value: "http://host.k8s.internal:8200"
            - name: VAULT_TOKEN
              value: "dev-root-token"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: secret-provider
  namespace: platform
  labels:
    aviary/service: secret-provider
spec:
  selector:
    aviary/service: secret-provider
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
