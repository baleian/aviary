# Supervisor itself runs in docker-compose, not in K3s. This file exists
# only to provision the ServiceAccount whose token docker-compose mounts
# into the supervisor container, plus the RBAC that lets the SA proxy
# HTTP calls into pool Services via the K8s API.
#
# In production (EKS) the supervisor runs as a Pod with auto-mounted SA
# credentials; this file is local-dev-only.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-supervisor
  namespace: agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aviary-agent-supervisor
rules:
  - apiGroups: [""]
    resources: [services/proxy]
    verbs: [get, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aviary-agent-supervisor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aviary-agent-supervisor
subjects:
  - kind: ServiceAccount
    name: agent-supervisor
    namespace: agents
